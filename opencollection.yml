opencollection: 1.0.0

info:
  name: wonkp
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: apikey
    key: authorization
    value: "{{token}}"
    placement: header
  scripts:
    - type: before-request
      code: |-
        const response = await bru.sendRequest({
          method: 'POST',
          url: 'https://test-api.mathplore.com/system-base/web/login',
          data: {
            "username": "",
            "password": "",
            "platform": "WEB",
            "type": 1,
            "forcedLogin": false,
            "deviceId": "5d35b1af-63de-48a1-bd94-ef4a74e77f8f"
        }
        }, function(err, res) {
          if (err) {
            console.error('Failed to get token:', err);
            return;
          }
          bru.setVar('token', res.data.data.tokenValue);
        });
bundled: false
extensions:
  bruno:
    ignore:
      - .idea
      - node_modules
      - .git
